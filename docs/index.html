<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grant Seeker — flood funding opportunities</title>
<style>
  :root {
    --bg: #f4f6f8; --card: #ffffff; --ink: #1c2733; --muted: #5b6b7a;
    --accent: #1f6f8b; --line: #e1e6eb; --chip: #e8f1f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    background: var(--accent); color: #fff; padding: 20px 24px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; opacity: .9; font-size: 13px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 20px 24px 60px; }
  .controls {
    position: sticky; top: 0; background: var(--bg); padding: 16px 0;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; z-index: 5;
    border-bottom: 1px solid var(--line);
  }
  .controls input, .controls select {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
    font: inherit; background: #fff; color: var(--ink);
  }
  #q { flex: 1 1 280px; }
  #count { color: var(--muted); font-size: 13px; margin-left: auto; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-top: 14px;
  }
  .card h2 { margin: 0 0 2px; font-size: 17px; }
  .card h2 a { color: var(--accent); text-decoration: none; }
  .card h2 a:hover { text-decoration: underline; }
  .funder { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .one { font-weight: 600; margin: 6px 0; }
  .summary { color: #33414e; margin: 6px 0 10px; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px 18px; font-size: 13px; color: var(--muted); }
  .meta b { color: var(--ink); font-weight: 600; }
  .topics { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--chip); color: var(--accent); border-radius: 999px;
    padding: 3px 10px; font-size: 12px;
  }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1>Flood funding opportunities</h1>
  <p>Grants, RFPs &amp; RFIs in coastal &amp; inland flooding, resilience and risk mapping — found automatically by Grant Seeker.</p>
</header>

<div class="wrap">
  <div class="controls">
    <input id="q" type="search" placeholder="Search title, funder, summary, eligibility…" autocomplete="off" />
    <select id="topic"><option value="">All topics</option></select>
    <select id="funder"><option value="">All funders</option></select>
    <select id="sort">
      <option value="first_seen">Newest first</option>
      <option value="due_date">Deadline</option>
      <option value="title">Title (A–Z)</option>
      <option value="funder">Funder (A–Z)</option>
    </select>
    <span id="count"></span>
  </div>
  <div id="results"></div>
</div>

<footer>Generated by Grant Seeker · this page is static and updates when the data is rebuilt.</footer>

<script src="opportunities.js"></script>
<script>
  const DATA = (window.OPPORTUNITIES || []).map(o => ({
    title: o.title || "", funder: o.funder || "", one_liner: o.one_liner || "",
    summary_paragraph: o.summary_paragraph || "", due_date: o.due_date || "",
    eligibility: o.eligibility || "", budget: o.budget || "",
    topics: Array.isArray(o.topics) ? o.topics : [],
    source_url: o.source_url || "", first_seen: o.first_seen || "",
  }));

  const qEl = document.getElementById("q");
  const topicEl = document.getElementById("topic");
  const funderEl = document.getElementById("funder");
  const sortEl = document.getElementById("sort");
  const countEl = document.getElementById("count");
  const resultsEl = document.getElementById("results");

  // Populate filter dropdowns from the data.
  [...new Set(DATA.flatMap(o => o.topics))].filter(Boolean).sort()
    .forEach(t => topicEl.add(new Option(t, t)));
  [...new Set(DATA.map(o => o.funder))].filter(Boolean).sort()
    .forEach(f => funderEl.add(new Option(f, f)));

  const esc = s => s.replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  function render() {
    const q = qEl.value.trim().toLowerCase();
    const topic = topicEl.value, funder = funderEl.value, sort = sortEl.value;

    let rows = DATA.filter(o => {
      if (topic && !o.topics.includes(topic)) return false;
      if (funder && o.funder !== funder) return false;
      if (q) {
        const hay = [o.title, o.funder, o.one_liner, o.summary_paragraph,
                     o.eligibility, o.budget, o.topics.join(" ")].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      if (sort === "first_seen") return (b.first_seen || "").localeCompare(a.first_seen || "");
      if (sort === "due_date") return (a.due_date || "~").localeCompare(b.due_date || "~");
      return (a[sort] || "").localeCompare(b[sort] || "");
    });

    countEl.textContent = `${rows.length} of ${DATA.length}`;
    resultsEl.innerHTML = rows.length ? rows.map(o => `
      <div class="card">
        <h2>${o.source_url ? `<a href="${esc(o.source_url)}" target="_blank" rel="noopener">${esc(o.title)}</a>` : esc(o.title)}</h2>
        <div class="funder">${esc(o.funder)}${o.first_seen ? ` · first seen ${esc(o.first_seen)}` : ""}</div>
        ${o.one_liner ? `<div class="one">${esc(o.one_liner)}</div>` : ""}
        ${o.summary_paragraph ? `<div class="summary">${esc(o.summary_paragraph)}</div>` : ""}
        <div class="meta">
          <span><b>Due:</b> ${esc(o.due_date || "unknown")}</span>
          <span><b>Budget:</b> ${esc(o.budget || "unknown")}</span>
          <span><b>Eligibility:</b> ${esc(o.eligibility || "unknown")}</span>
        </div>
        ${o.topics.length ? `<div class="topics">${o.topics.map(t => `<span class="chip">${esc(t)}</span>`).join("")}</div>` : ""}
      </div>`).join("")
      : `<div class="empty">No opportunities match your filters.</div>`;
  }

  [qEl, topicEl, funderEl, sortEl].forEach(el => el.addEventListener("input", render));
  render();
</script>
</body>
</html>
