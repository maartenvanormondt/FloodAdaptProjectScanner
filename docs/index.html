<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FloodAdapt funding opportunities</title>
<style>
  :root {
    --bg: #f4f6f8; --card: #ffffff; --ink: #1c2733; --muted: #5b6b7a;
    --accent: #1f6f8b; --line: #e1e6eb; --chip: #e8f1f4;
    --like: #1f8b4c; --dislike: #b23b3b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header { background: var(--accent); color: #fff; padding: 20px 24px; }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; opacity: .9; font-size: 13px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 20px 24px 60px; }
  .controls {
    position: sticky; top: 0; background: var(--bg); padding: 16px 0;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; z-index: 5;
    border-bottom: 1px solid var(--line);
  }
  .controls input, .controls select {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
    font: inherit; background: #fff; color: var(--ink);
  }
  #q { flex: 1 1 240px; }
  #count { color: var(--muted); font-size: 13px; margin-left: auto; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-top: 14px; border-left: 4px solid var(--line);
  }
  .card.liked { border-left-color: var(--like); }
  .card.disliked { border-left-color: var(--dislike); opacity: .65; }
  .card h2 { margin: 0 0 2px; font-size: 17px; }
  .card h2 a { color: var(--accent); text-decoration: none; }
  .card h2 a:hover { text-decoration: underline; }
  .funder { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .one { font-weight: 600; margin: 6px 0; }
  .summary { color: #33414e; margin: 6px 0 10px; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px 18px; font-size: 13px; color: var(--muted); }
  .meta b { color: var(--ink); font-weight: 600; }
  .topics { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--chip); color: var(--accent); border-radius: 999px; padding: 3px 10px; font-size: 12px; }
  .chip.region { background: #eef0f2; color: var(--muted); }
  .verdict { margin-top: 12px; display: flex; gap: 8px; }
  .vbtn {
    border: 1px solid var(--line); background: #fff; color: var(--muted);
    border-radius: 8px; padding: 6px 12px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .vbtn:hover { border-color: var(--muted); }
  .vbtn.on-like { background: var(--like); color: #fff; border-color: var(--like); }
  .vbtn.on-dislike { background: var(--dislike); color: #fff; border-color: var(--dislike); }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1>FloodAdapt funding opportunities</h1>
  <p>Grants, RFPs &amp; RFIs in coastal &amp; inland flooding, resilience and risk mapping — found automatically by Maarten's Grant Seeker.</p>
</header>

<div class="wrap">
  <div class="controls">
    <input id="q" type="search" placeholder="Search title, funder, summary…" autocomplete="off" />
    <select id="status">
      <option value="active">Active (hide rejected)</option>
      <option value="like">👍 Promising</option>
      <option value="undecided">Undecided</option>
      <option value="dislike">👎 Rejected</option>
      <option value="all">All (incl. rejected)</option>
    </select>
    <select id="region"><option value="">All regions</option></select>
    <select id="topic"><option value="">All topics</option></select>
    <select id="funder"><option value="">All funders</option></select>
    <select id="sort">
      <option value="first_seen">Newest first</option>
      <option value="due_date">Deadline</option>
      <option value="title">Title (A–Z)</option>
      <option value="funder">Funder (A–Z)</option>
    </select>
    <span id="count"></span>
  </div>
  <div id="results"></div>
</div>

<footer>Generated by Maarten's Grant Seeker · static page · likes/dislikes are shared via the team store (or saved locally if not configured).</footer>

<script src="opportunities.js"></script>
<script>
  // Set this to your deployed Cloudflare Worker URL to SHARE likes/dislikes
  // across everyone. Leave "" to keep them only in this browser (localStorage).
  const VERDICTS_API = "https://grant-seeker-verdicts.maarten-vanormondt.workers.dev";

  const VERDICT_KEY = "grantseeker:verdicts";
  let verdicts = {};
  try { verdicts = JSON.parse(localStorage.getItem(VERDICT_KEY)) || {}; } catch (e) { verdicts = {}; }
  const cacheVerdicts = () => localStorage.setItem(VERDICT_KEY, JSON.stringify(verdicts));

  // Pull everyone's shared verdicts from the Worker (if configured).
  async function loadServerVerdicts() {
    if (!VERDICTS_API) return;
    try {
      const r = await fetch(VERDICTS_API, { cache: "no-store" });
      if (r.ok) { verdicts = await r.json(); cacheVerdicts(); render(); }
    } catch (e) { /* offline: keep the local copy */ }
  }

  function setVerdict(key, v) {
    if (verdicts[key] === v) delete verdicts[key];   // click again to clear
    else verdicts[key] = v;
    cacheVerdicts();
    render();
    if (VERDICTS_API) {
      fetch(VERDICTS_API, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: key, verdict: verdicts[key] || null }),
      }).catch(() => {});
    }
  }

  const DATA = (window.OPPORTUNITIES || []).map(o => ({
    title: o.title || "", funder: o.funder || "", one_liner: o.one_liner || "",
    summary_paragraph: o.summary_paragraph || "", due_date: o.due_date || "",
    eligibility: o.eligibility || "", budget: o.budget || "",
    topics: Array.isArray(o.topics) ? o.topics : [],
    source_url: o.source_url || "", first_seen: o.first_seen || "",
    region: o.region || "", id: o.id || "",
    key: o.id || o.source_url || "",   // verdict key: per-opportunity id (URL fallback)
  }));

  const qEl = document.getElementById("q");
  const statusEl = document.getElementById("status");
  const regionEl = document.getElementById("region");
  const topicEl = document.getElementById("topic");
  const funderEl = document.getElementById("funder");
  const sortEl = document.getElementById("sort");
  const countEl = document.getElementById("count");
  const resultsEl = document.getElementById("results");

  [...new Set(DATA.map(o => o.region))].filter(Boolean).sort()
    .forEach(r => regionEl.add(new Option(r, r)));
  [...new Set(DATA.flatMap(o => o.topics))].filter(Boolean).sort()
    .forEach(t => topicEl.add(new Option(t, t)));
  [...new Set(DATA.map(o => o.funder))].filter(Boolean).sort()
    .forEach(f => funderEl.add(new Option(f, f)));

  const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  function render() {
    const q = qEl.value.trim().toLowerCase();
    const status = statusEl.value, region = regionEl.value;
    const topic = topicEl.value, funder = funderEl.value, sort = sortEl.value;

    let rows = DATA.filter(o => {
      const v = verdicts[o.key];
      if (status === "active" && v === "dislike") return false;   // default: hide rejected
      if (status === "like" && v !== "like") return false;
      if (status === "dislike" && v !== "dislike") return false;
      if (status === "undecided" && v) return false;
      // status === "all" → show everything, including rejected
      if (region && o.region !== region) return false;
      if (topic && !o.topics.includes(topic)) return false;
      if (funder && o.funder !== funder) return false;
      if (q) {
        const hay = [o.title, o.funder, o.one_liner, o.summary_paragraph,
                     o.eligibility, o.budget, o.region, o.topics.join(" ")].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      if (sort === "first_seen") return (b.first_seen || "").localeCompare(a.first_seen || "");
      if (sort === "due_date") return (a.due_date || "~").localeCompare(b.due_date || "~");
      return (a[sort] || "").localeCompare(b[sort] || "");
    });

    countEl.textContent = `${rows.length} of ${DATA.length}`;
    resultsEl.innerHTML = rows.length ? rows.map(o => {
      const v = verdicts[o.key];
      const cls = v === "like" ? " liked" : v === "dislike" ? " disliked" : "";
      const u = esc(o.source_url);
      return `
      <div class="card${cls}">
        <h2>${o.source_url ? `<a href="${u}" target="_blank" rel="noopener">${esc(o.title)}</a>` : esc(o.title)}</h2>
        <div class="funder">${esc(o.funder)}${o.first_seen ? ` · first seen ${esc(o.first_seen)}` : ""}</div>
        ${o.one_liner ? `<div class="one">${esc(o.one_liner)}</div>` : ""}
        ${o.summary_paragraph ? `<div class="summary">${esc(o.summary_paragraph)}</div>` : ""}
        <div class="meta">
          <span><b>Due:</b> ${esc(o.due_date || "unknown")}</span>
          <span><b>Budget:</b> ${esc(o.budget || "unknown")}</span>
          <span><b>Eligibility:</b> ${esc(o.eligibility || "unknown")}</span>
        </div>
        <div class="topics">
          ${o.region ? `<span class="chip region">${esc(o.region)}</span>` : ""}
          ${o.topics.map(t => `<span class="chip">${esc(t)}</span>`).join("")}
        </div>
        <div class="verdict">
          <button class="vbtn${v === "like" ? " on-like" : ""}" data-key="${esc(o.key)}" data-v="like">👍 Promising</button>
          <button class="vbtn${v === "dislike" ? " on-dislike" : ""}" data-key="${esc(o.key)}" data-v="dislike">👎 Reject</button>
        </div>
      </div>`;
    }).join("")
      : `<div class="empty">No opportunities match your filters.</div>`;
  }

  resultsEl.addEventListener("click", e => {
    const btn = e.target.closest("button[data-v]");
    if (!btn) return;
    setVerdict(btn.dataset.key, btn.dataset.v);
  });

  [qEl, statusEl, regionEl, topicEl, funderEl, sortEl].forEach(el => el.addEventListener("input", render));
  render();
  loadServerVerdicts();
</script>
</body>
</html>
