# Known, often-fruitful places to look for flood-related funding.
# These are fed into the search prompt as "check these first, then hunt for new
# ones." The agent also LEARNS new fruitful sources over time and stores them in
# data/sources_db.json — so this list is a seed, not the whole picture.
# Add/remove freely.
sources:
  - name: Grants.gov (US federal grants)
    url: https://www.grants.gov
  - name: SAM.gov (US federal contracts / RFPs / RFIs)
    url: https://sam.gov
  - name: FEMA grants (BRIC, Flood Mitigation Assistance)
    url: https://www.fema.gov/grants
  - name: NOAA grants
    url: https://www.noaa.gov/grants
  - name: US EPA grants
    url: https://www.epa.gov/grants
  - name: National Science Foundation (NSF)
    url: https://www.nsf.gov/funding
  - name: EU Funding & Tenders Portal (Horizon Europe, LIFE)
    url: https://ec.europa.eu/info/funding-tenders/opportunities/portal
  - name: Interreg (European territorial cooperation)
    url: https://www.interregeurope.eu
  - name: UK Research and Innovation (UKRI)
    url: https://www.ukri.org/opportunity
  - name: Netherlands Enterprise Agency (RVO)
    url: https://www.rvo.nl/subsidies-financiering
  - name: World Bank / GFDRR (disaster risk)
    url: https://www.gfdrr.org
  - name: Green Climate Fund
    url: https://www.greenclimate.fund
  - name: Adaptation Fund
    url: https://www.adaptation-fund.org

  # --- US state & local (esp. coastal) ---
  - name: Resilient Florida Program (Florida DEP)
    url: https://floridadep.gov/ResilientFlorida
  - name: Florida Resilient Coastlines Program
    url: https://floridadep.gov/rcp
  - name: Louisiana Watershed Initiative
    url: https://www.lawatershed.org
  - name: Texas General Land Office — Community Development & Revitalization
    url: https://recovery.texas.gov
  - name: California Coastal Conservancy grants
    url: https://scc.ca.gov/grants
  - name: New York State (GOSR / climate resilience)
    url: https://stormrecovery.ny.gov

  # --- Canada ---
  - name: Infrastructure Canada — Disaster Mitigation and Adaptation Fund (DMAF)
    url: https://www.infrastructure.gc.ca/dmaf-faac/index-eng.html
  - name: FCM Green Municipal Fund (Canada)
    url: https://greenmunicipalfund.ca

  # --- International development banks & city programs ---
  - name: Asian Development Bank (ADB)
    url: https://www.adb.org/what-we-do/funds
  - name: ADB Urban Climate Change Resilience Trust Fund (UCCRTF)
    url: https://www.adb.org/what-we-do/funds/urban-climate-change-resilience-trust-fund
  - name: World Bank Projects & Operations
    url: https://projects.worldbank.org
  - name: C40 Cities Finance Facility
    url: https://www.c40cff.org
